name: Build PPG Extras

on:
  workflow_dispatch:
    inputs:
      packages:
        description: extra packages to build for custom images (comma separated)
        required: true
        default: "postgres,h3-pg,hll,ip4r,pg_cron,pg_similarity,pgrouting,pgvectorscale,postgres-unit,rum,timescaledb"

      packaging-repo:
        description: packaging repo to be used
        default: percona/postgres-packaging
        required: true

      packaging-branch:
        description: packaging branch to be used
        default: 18.3-extras
        required: true

      pg-major:
        description: Postgres major version for which package will be built
        required: true
        default: "18"
        type: choice
        options:
          - "18"
          - "17"
          - "16"

      #ppg-repo:
      #  description: ppg repo to be enabled
      #  required: true
      #  default: ppg-18-extras
      #  type: choice
      #  options:
      #    - ppg-18-extras
      #    - ppg-17-extras
      #    - ppg-16-extras

      ppg-repo-type:
        description: ppg repo type
        required: true
        default: experimental
        type: choice
        options:
          - experimental
          - testing

      debugging:
        description: tmate session required
        default: false
        type: boolean
        
jobs:
  prepare-matrix:
   runs-on: ubuntu-latest
   outputs:
      BUILD_ID: ${{ steps.set-buildID.outputs.build_id }}
      PKG_MATRIX: ${{ steps.set-pkg-matrix.outputs.pkg_matrix }}
      SOURCE_MATRIX: ${{ steps.set-source-matrix.outputs.source_matrix }}
      BUILD_MATRIX: ${{ steps.set-build-matrix.outputs.build_matrix }}

   steps:
     - name: Set timestamp
       run: echo "TIMESTAMP=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_ENV

     - name: Set Build ID
       id: set-buildID
       run: echo "build_id=${{ env.TIMESTAMP }}/${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

     - name: Set Package Matrix
       id: set-pkg-matrix
       run: |
          PKG_MATRIX=$(echo "${{ inputs.packages }}" | tr -d ' ' | jq -c -R 'split(",") | {pkgs: .}')
          echo "pkg_matrix=$PKG_MATRIX" >> $GITHUB_OUTPUT

     #- name: Set source rpm/deb matrix
     #  id: set-source-matrix
     #  run: |
     #     PKG=$(echo "${{ inputs.packages }}" | tr -d ' ' | jq -c -R 'split(",")')
     #     if [ "${{ inputs.distro }}" = "rpm" ]; then
     #       PLATFORM='["oraclelinux:9"]'
     #     elif [ "${{ inputs.distro }}" = "deb" ]; then
     #       PLATFORM='["ubuntu:jammy"]'
     #     else
     #       PLATFORM='["oraclelinux:8","ubuntu:jammy"]'
     #     fi
     #     SOURCE_MATRIX=$(jq -c -n \
     #         --argjson pkgs "$PKG" \
     #         --argjson platform "$PLATFORM" \
     #         '{pkgs:$pkgs, platform:$platform}')
     #     echo "source_matrix=$SOURCE_MATRIX" >> $GITHUB_OUTPUT

     #- name: Set rpm/deb build matrix
     #  id: set-build-matrix
     #  run: |
     #     ARCH='["amd64","arm64"]'
     #     PKG=$(echo "${{ inputs.packages }}" | tr -d ' ' | jq -c -R 'split(",")')
     #     if [ "${{ inputs.distro }}" = "rpm" ]; then
     #       #PLATFORM='["oraclelinux:8","oraclelinux:9","oraclelinux:10"]'
     #       PLATFORM='["oraclelinux:9"]'
     #     elif [ "${{ inputs.distro }}" = "deb" ]; then
     #       PLATFORM='["ubuntu:noble","ubuntu:jammy","debian:bookworm","debian:bullseye","debian:trixie"]'
     #     else
     #       PLATFORM='["oraclelinux:8","oraclelinux:9","oraclelinux:10","ubuntu:noble","ubuntu:jammy","debian:bookworm","debian:bullseye","debian:trixie"]'
     #     fi
     #     BUILD_MATRIX=$(jq -c -n \
     #       --argjson pkgs "$PKG" \
     #       --argjson platform "$PLATFORM" \
     #       --argjson arch "$ARCH" \
     #       '{pkgs:$pkgs, platform:$platform, arch:$arch}')
     #     echo "build_matrix=$BUILD_MATRIX" >> $GITHUB_OUTPUT

  pull-build-files:
    runs-on: ubuntu-latest
    needs: [prepare-matrix]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.PKG_MATRIX) }}

    steps:
      - name: Checkout packaging repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          repository: ${{ inputs.packaging-repo }}
          ref: ${{ inputs.packaging-branch }}
          path: src

      - name: Create build files directory
        run: mkdir pkg

      - name: Collect common files
        run: |
          cp src/common-functions.sh pkg/
          cp src/install-deps.sh pkg/
          cp src/versions.sh pkg/
          cp src/${{ matrix.pkgs }}/*builder.sh pkg/pkg-builder.sh
        shell: bash

      - name: Upload build files as artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-files-${{ matrix.pkgs }}
          path: pkg/
          
  build-source-tarball:
    runs-on: ubuntu-latest
    needs: [prepare-matrix, pull-build-files]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.PKG_MATRIX) }}

    steps:
      - name: Get build-files from artifact
        uses: actions/download-artifact@v5
        with:
          name: build-files-${{ matrix.pkgs }}
          path: ./

      - name: Update permissions of the build scripts
        run: |
          chmod 755 *.sh
        shell: bash

      - name: Build Sources
        run: |
          mkdir test
          sudo -E bash ./pkg-builder.sh --builddir=$(pwd)/test --get_sources=1 --pg_major=${{ inputs.pg-major }}
        shell: bash

      - name: Upload source tarballs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.pkgs }}-source_tarball
          path: source_tarball

  build-srpm:
    runs-on: ubuntu-latest
    needs: [prepare-matrix, pull-build-files, build-source-tarball]

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.PKG_MATRIX) }}

    container:
      image: oraclelinux:9

    steps:
      - name: Check OS
        run: cat /etc/os-release

      - name: Install build tools
        run: |
          yum install -y gcc make tar rpm-build rpmdevtools git sudo
          echo "Ready to build!"

      - name: Get build files from artifact
        uses: actions/download-artifact@v5
        with:
          name: build-files-${{ matrix.pkgs }}
          path: ./

      - name: Update permissions of the build scripts
        run: |
          chmod 755 *.sh
        shell: bash

      - name: Get source tarball from artifact
        uses: actions/download-artifact@v5
        with:
          name: ${{ matrix.pkgs }}-source_tarball
          path: test/source_tarball/

      - name: Install dependencies
        run: |
          sudo bash ./pkg-builder.sh --builddir=$(pwd)/test --install_deps=1 --pg_major=${{ inputs.pg-major }} --repo_component=${{ inputs.ppg-repo-type }}
        shell: bash

      - name: Build Source RPM
        run: |
          sudo bash ./pkg-builder.sh --builddir=$(pwd)/test --build_src_rpm=1 --pg_major=${{ inputs.pg-major }} --repo_component=${{ inputs.ppg-repo-type }}
        shell: bash

      - name: Upload source rpm as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.pkgs }}-srpm
          path: srpm

  build-rpm:
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    needs: [prepare-matrix, pull-build-files, build-source-tarball, build-srpm]

    strategy:
      fail-fast: false
      max-parallel: 16
      matrix:
      pkgs: ${{ fromJson(needs.prepare-matrix.outputs.PKG_MATRIX).pkgs }}
      arch: [amd64, arm64]

    container:
      image: oraclelinux:9

    steps:
      - name: Check OS
        run: cat /etc/os-release

      - name: Install build tools
        run: |
          yum install -y gcc make tar rpm-build rpmdevtools git sudo
          echo "Ready to build!"

      - name: Get build-files from artifact
        uses: actions/download-artifact@v5
        with:
          name: build-files-${{ matrix.pkgs }}
          path: ./

      - name: Update permissions of the build scripts
        run: |
          chmod 755 *.sh
        shell: bash

      - name: Get source tarball from artifact
        uses: actions/download-artifact@v5
        with:
          name: ${{ matrix.pkgs }}-source_tarball
          path: test/source_tarball/

      - name: Get source rpm from artifact
        uses: actions/download-artifact@v5
        with:
          name: ${{ matrix.pkgs }}-srpm
          path: test/srpm/

      - name: Install dependencies
        run: |
          sudo bash ./pkg-builder.sh --builddir=$(pwd)/test --install_deps=1 --pg_major=${{ inputs.pg-major }} --repo_component=${{ inputs.ppg-repo-type }}
        shell: bash

      - name: Build RPM
        continue-on-error: true
        run: |
          sudo bash ./pkg-builder.sh --builddir=$(pwd)/test --build_rpm=1 --pg_major=${{ inputs.pg-major }} --repo_component=${{ inputs.ppg-repo-type }}
        shell: bash

      - name: Upload rpms as artifact
        if: ${{ contains(matrix.platform, 'linux') }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.pkgs }}-ol9-${{ matrix.arch }}
          path: rpm

  upload-draft-release:
    runs-on: ubuntu-latest
    needs: [prepare-matrix, pull-build-files, build-source-tarball, build-srpm, build-rpm]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.PKG_MATRIX) }}

    steps:
     - name: Get build-files from artifact
       uses: actions/download-artifact@v5
       with:
        pattern: build-files-${{ matrix.pkgs }}
        path: ./

     - name: Get all the artifacts
       uses: actions/download-artifact@v5
       with:
        pattern: ${{ matrix.pkgs }}-*
        path: artifacts

     - name: Get package full name and upload path
       run: |
          PKG_UPPER=$(echo "${{ matrix.pkgs }}" | tr '[:lower:]' '[:upper:]')
          comp_version=$(grep "^${PKG_UPPER}_VERSION=" versions.sh | cut -d '=' -f2)
          pkg_name="${{ matrix.pkgs }}-$comp_version"
          echo "pkg_name=$pkg_name" >> "$GITHUB_ENV"
          echo "UPLOAD_PATH=${{ matrix.pkgs }}/$pkg_name/${{ needs.prepare-matrix.outputs.BUILD_ID }}" >> "$GITHUB_ENV"

     - name: Create final artifact structure
       run: |
        mkdir -p ${{ env.UPLOAD_PATH }}/source_tarball
        mkdir -p ${{ env.UPLOAD_PATH }}/srpm
        mkdir -p ${{ env.UPLOAD_PATH }}/rpm

     - name: Copy all the artifacts to required location
       run: |
          cp artifacts/${{ matrix.pkgs }}-source_tarball/* "${{ env.UPLOAD_PATH }}/source_tarball/"
          cp -n artifacts/${{ matrix.pkgs }}-srpm/* "${{ env.UPLOAD_PATH }}/srpm/"
          cp -n artifacts/${{ matrix.pkgs }}-ol9-*/* "${{ env.UPLOAD_PATH }}/rpm/"
          
     - name: Archive final artifact
       run: tar -czf ${{ env.pkg_name }}.tar.gz ${{ matrix.pkgs }}

     - name: Upload final artifact as release artifact
       uses: softprops/action-gh-release@v2
       with:
        draft: true
        tag_name: ${{ env.pkg_name }}-rpm build_id-${{ github.run_number }}
        name: ${{ env.pkg_name }}-rpm-PG${{ inputs.pg-major }}-extras build_id-${{ github.run_number }}
        files: ${{ env.pkg_name }}.tar.gz

     - name: enable tmate debugging
       if: inputs.debugging && failure()
       uses: mxschmitt/action-tmate@v3
       timeout-minutes: 60